<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friends Viewer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
    }

    h1 {
      margin-bottom: 1rem;
    }

    .controls {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    input[type="number"] {
      padding: 0.5rem;
      width: 120px;
    }

    button {
      padding: 0.5rem 1rem;
      cursor: pointer;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 1rem;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 0.6rem;
      text-align: left;
    }

    th {
      background-color: #f4f4f4;
    }

    .message {
      margin-top: 1rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Friends</h1>

  <div class="controls">
    <button id="loadAllBtn">Load All Friends</button>
    <button id="findBtn">Find Friend</button>
    <input type="number" id="friendId" placeholder="Enter friend's ID" />
  </div>

  <div id="message" class="message"></div>

  <table id="friendsTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Phone</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  </table>

  <script src="myscripts.js"></script>

  </script>
  
</body>
</html>
